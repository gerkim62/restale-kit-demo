version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: todo-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_pass
      - POSTGRES_DB=todo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres_pass@db:5432/todo_db
      - JWT_SECRET=docker_jwt_secret_key_change_me_in_production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
